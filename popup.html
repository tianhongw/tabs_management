<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tab Management</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Tab Management</h1>
          <p id="summary" class="summary">Loading tabs...</p>
        </div>
        <button id="refreshButton" class="icon-button" type="button" title="Refresh tabs" aria-label="Refresh tabs">
          <svg class="button-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M21 12a9 9 0 0 1-15.6 6.12L3 16"></path>
            <path d="M3 21v-5h5"></path>
            <path d="M3 12A9 9 0 0 1 18.6 5.88L21 8"></path>
            <path d="M21 3v5h-5"></path>
          </svg>
        </button>
      </header>

      <section class="controls" aria-label="Tab controls">
        <label class="search">
          <span class="search-mark" aria-hidden="true">/</span>
          <input id="searchInput" type="search" placeholder="Search title or URL" autocomplete="off">
        </label>
        <div class="actions">
          <button id="currentWindowButton" class="control-button" type="button" aria-pressed="false">Current window</button>
          <button id="duplicatesButton" class="control-button" type="button">Duplicates</button>
          <button id="closeAllButton" class="control-button danger-button" type="button">Close all</button>
        </div>
      </section>

      <section id="status" class="status" hidden></section>
      <section id="tabsRoot" class="tabs-root" aria-live="polite"></section>
    </main>

    <template id="groupTemplate">
      <section class="tab-group">
        <div class="group-heading">
          <div class="group-copy">
            <h2></h2>
            <span></span>
          </div>
          <button class="group-close-button" type="button">Close group</button>
        </div>
        <div class="tab-list"></div>
      </section>
    </template>

    <template id="tabTemplate">
      <article class="tab-row">
        <button class="tab-main" type="button">
          <span class="favicon-wrap">
            <img class="favicon" alt="" loading="lazy">
            <span class="favicon-fallback" aria-hidden="true"></span>
          </span>
          <span class="tab-copy">
            <span class="tab-title"></span>
            <span class="tab-url"></span>
          </span>
        </button>
        <div class="tab-actions">
          <button class="mini-button pin-button" type="button" title="Pin or unpin tab" aria-label="Pin or unpin tab">Pin</button>
          <button class="mini-button mute-button" type="button" title="Mute or unmute tab" aria-label="Mute or unmute tab">Mute</button>
          <button class="mini-button close-button" type="button" title="Close tab" aria-label="Close tab">X</button>
        </div>
      </article>
    </template>

    <script src="popup.js"></script>
  </body>
</html>
